name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Least-privilege: CI only reads the repo (lint + tests); no write scopes needed.
permissions:
  contents: read

jobs:
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: '**/*.md'
          config: '.markdownlint.json'
        continue-on-error: true

  contracts-test:
    name: Foundry Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0
        with:
          version: stable

      - name: Show Forge version
        run: forge --version

      - name: Install dependencies (OpenZeppelin + forge-std)
        run: forge install OpenZeppelin/openzeppelin-contracts foundry-rs/forge-std --shallow

      - name: Run forge fmt check
        run: forge fmt --check
        continue-on-error: true

      - name: Run forge build
        run: forge build --sizes
        id: build

      - name: Run forge tests
        run: forge test -vvv
        id: test

  halmos-symbolic:
    name: Halmos symbolic verification (${{ matrix.contract }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: contracts-test
    strategy:
      fail-fast: false
      matrix:
        # Both Halmos test contracts run as separate matrix legs so a failure
        # on one is attributable on first read of the run page. The Attester
        # suite has 19 proofs; the Token suite has 6.
        contract: [NoethrionAttesterHalmosTest, NoethrionTokenHalmosTest]
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0
        with:
          version: stable

      - name: Install dependencies (OpenZeppelin + forge-std)
        run: forge install OpenZeppelin/openzeppelin-contracts foundry-rs/forge-std --shallow

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install Halmos (pinned)
        # Pinned to 0.3.x — a future Halmos may change SMT defaults,
        # assertion semantics, or vm.assume handling, which would
        # silently retroactively change the proofs against this SHA.
        # Bump after a manual local re-run on the same source.
        run: pip install 'halmos==0.3.3'

      - name: Show Halmos version
        run: halmos --version

      - name: Run Halmos symbolic checks
        # `--match-contract` pins this leg to one of the two suites; the run
        # fails if any single `check_*` returns a counterexample. Failures
        # are protocol-breaking — the contract surface lets some adversarial
        # input through a symbolic property we claimed was universal.
        # We capture stdout so a subsequent step can assert that at least one
        # `check_*` actually ran — guarding against a future rename that
        # would silently collect zero tests under `--match-contract`.
        run: |
          set -o pipefail
          halmos --contract ${{ matrix.contract }} | tee /tmp/halmos-${{ matrix.contract }}.log

      - name: Assert at least one symbolic check executed
        # Defensive: catches a future refactor (e.g., suite rename) where
        # `--match-contract` matches zero functions and Halmos exits 0 with
        # "no tests collected". Without this, CI would silently green even
        # if the whole symbolic surface vanished. The summary line we match
        # is the only plain-text line in the halmos output that does not
        # carry ANSI escape sequences.
        run: |
          grep -qE 'Symbolic test result: [1-9][0-9]* passed; 0 failed' /tmp/halmos-${{ matrix.contract }}.log

  lifecycle-smoke:
    name: Lifecycle smoke test (threshold=${{ matrix.threshold }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: contracts-test
    strategy:
      fail-fast: false
      matrix:
        # threshold=1 exercises the single-validator path (proposer is the
        # only voter). threshold=3 exercises the m-of-n quorum: deployer +
        # two extra validators, voteBatch loop, voteCount sanity check.
        threshold: [1, 3]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0
        with:
          version: stable

      - name: Install dependencies (OpenZeppelin + forge-std)
        working-directory: contracts
        run: forge install OpenZeppelin/openzeppelin-contracts foundry-rs/forge-std --shallow

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt

      - name: Run lifecycle smoke test
        # 2026-06-09: run 27186170930 hung for 6h inside `forge script
        # --broadcast` (orphan forge process waiting on a receipt from the
        # just-started Anvil). A healthy run finishes in ~30s, so bound each
        # attempt to 5 minutes and retry once before failing the job.
        timeout-minutes: 12
        env:
          THRESHOLD: ${{ matrix.threshold }}
        run: |
          for attempt in 1 2; do
            if timeout 300 ./tools/run_lifecycle.sh; then
              exit 0
            fi
            echo "[!] lifecycle attempt $attempt failed or timed out (300s)"
          done
          echo "[!] lifecycle smoke test failed after 2 attempts"
          exit 1

  node-verifier:
    name: Verifier node (Go + WASM + 3-way parity)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: contracts-test
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0
        with:
          version: stable

      - name: Install dependencies (OpenZeppelin + forge-std)
        working-directory: contracts
        run: forge install OpenZeppelin/openzeppelin-contracts foundry-rs/forge-std --shallow

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: node/go/go.mod
          cache-dependency-path: |
            node/go/go.sum
            node/go/wasm/go.sum

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        # tools/requirements.txt covers the crypto engine (cryptography +
        # pycryptodome); node/requirements.txt adds the node's on-chain deps
        # (web3 + eth-abi). The gate/parity scripts fall back to `python3`
        # when the local venv is absent, so installing into the runner's
        # default interpreter is sufficient.
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt -r node/requirements.txt

      - name: Build Go verifier
        working-directory: node/go
        run: go build ./...

      - name: Build WASM verifier (GOOS=js GOARCH=wasm)
        working-directory: node/go/wasm
        env:
          GOOS: js
          GOARCH: wasm
        run: go build ./...

      - name: Run launch-gate test (OK / ALARM)
        run: bash node/_gate_test.sh

      - name: Run 3-way parity test (Python / Go / WASM)
        run: bash node/_parity_test.sh

  firmware-build:
    name: Firmware Build (placeholder)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: false  # enable when firmware/ has real code
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Setup PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio
      - name: Build firmware
        run: pio run -d firmware
