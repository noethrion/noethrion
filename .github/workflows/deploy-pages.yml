# Deploy the static landing + docs bundle to Cloudflare Pages.
#
# One-time setup (founder action — not automated):
#
#   1. Create Cloudflare Pages project named `noethrion-landing` in the
#      Cloudflare dashboard, "Direct Upload" mode (no Git integration —
#      this workflow does the upload).
#   2. Generate a scoped API token: dashboard → My Profile → API Tokens
#      → Create Token → "Edit Cloudflare Workers" template, then narrow
#      Account scope to: Cloudflare Pages: Edit, Account Settings: Read.
#   3. Add two repository secrets in GitHub:
#        - CLOUDFLARE_API_TOKEN  (the token from step 2)
#        - CLOUDFLARE_ACCOUNT_ID (Cloudflare dashboard → right sidebar)
#   4. Bind the custom domain `noethrion.com` to the Pages project in
#      the Cloudflare dashboard (Pages project → Custom domains).
#
# After setup, every push to main that touches docs/ triggers a deploy.
# Manual deploys via the Actions tab → "workflow_dispatch".
#
# Rollback: previous deployments are retained in the Cloudflare Pages
# dashboard for 90 days; promote any prior deployment to production
# via the dashboard if a bad push goes live.

name: Deploy landing to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'assets/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

concurrency:
  # Per-ref grouping so a manual workflow_dispatch and a main push don't
  # silently queue behind each other when they happen on the same ref.
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: false  # don't kill an in-flight deploy mid-upload

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      # Soft-skip guard. While Cloudflare secrets are not yet configured the
      # workflow runs but exits successfully with a console warning, so GitHub
      # does not fire failure notifications on every push to main.
      # Once both secrets are set in repo Settings, the subsequent push (or a
      # manual workflow_dispatch) starts deploying automatically.
      - name: Check for required Cloudflare secrets
        id: secret_check
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCOUNT" ]; then
            echo "::warning::Cloudflare Pages deploy skipped — CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID secrets not configured."
            echo "::warning::Setup steps are in this workflow file's header comments. Once both secrets are added in repo Settings → Secrets, the next push triggers a real deploy."
            echo "have_secrets=false" >> "$GITHUB_OUTPUT"
          else
            echo "have_secrets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.secret_check.outputs.have_secrets == 'true'
        uses: actions/checkout@v4

      - name: Verify docs/ exists and contains index.html
        if: steps.secret_check.outputs.have_secrets == 'true'
        run: |
          test -d docs || { echo "::error::docs/ directory missing"; exit 1; }
          test -f docs/index.html || { echo "::error::docs/index.html missing — Cloudflare Pages needs an entry point"; exit 1; }
          echo "docs/ has $(find docs -type f | wc -l) files totaling $(du -sh docs | cut -f1)"

      - name: Deploy to Cloudflare Pages
        if: steps.secret_check.outputs.have_secrets == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs --project-name=noethrion-landing --branch=main
          # gitHubToken intentionally omitted: workflow runs only on push to main,
          # never on PRs, so the action's PR-comment feature has nothing to comment on.
