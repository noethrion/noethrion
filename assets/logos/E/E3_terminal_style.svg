  <rect width="800" height="200" fill="#0A0A0A"/>
  <text x="40" y="120" font-family="JetBrains Mono, Courier, monospace" font-size="36" font-weight="400" fill="#14F195">$</text>
  <text x="80" y="120" font-family="JetBrains Mono, Courier, monospace" font-size="36" font-weight="400" fill="#F5F1E8">noethrion --status</text>
  <text x="490" y="120" font-family="JetBrains Mono, Courier, monospace" font-size="36" font-weight="400" fill="#6B6862">→</text>
  <text x="540" y="125" font-family="Instrument Serif, Times New Roman, serif" font-size="56" font-style="italic" font-weight="400" fill="#14F195">η</text>
  <text x="595" y="120" font-family="JetBrains Mono, Courier, monospace" font-size="28" font-weight="400" fill="#6B6862">live</text>
</svg>
