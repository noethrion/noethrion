<?xml version="1.0" encoding="UTF-8"?>
<!-- F1: Hero Display Version -->
<!-- Огромная η + label слева "Eta · Greek letter · symbol of efficiency" -->
<!-- Editorial style — для hero sections, presentations -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <rect width="1200" height="600" fill="#0A0A0A"/>

  <!-- Mono caption left -->
  <text x="60" y="100" font-family="JetBrains Mono, Courier, monospace" font-size="11" font-weight="400" fill="#6B6862">// PRIMARY MARK · v0.2</text>
  <text x="60" y="120" font-family="JetBrains Mono, Courier, monospace" font-size="11" font-weight="400" fill="#6B6862">// η = E_useful / E_total</text>

  <!-- Large eta -->
  <text x="600" y="450" font-family="Instrument Serif, Times New Roman, serif" font-size="500" font-style="italic" font-weight="400" text-anchor="middle" fill="#14F195">η</text>

  <!-- Baseline -->
  <line x1="380" y1="490" x2="820" y2="490" stroke="#F5F1E8" stroke-width="1.5"/>

  <!-- Mono caption right -->
  <text x="60" y="560" font-family="JetBrains Mono, Courier, monospace" font-size="11" font-weight="400" fill="#6B6862">// noethrion · open standard for verifiable energy</text>
</svg>
