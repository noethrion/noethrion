<?xml version="1.0" encoding="UTF-8"?>
<!-- F2: Editorial Vertical -->
<!-- Large η on top, baseline, "NOETHRION" + tagline below -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#0A0A0A"/>

  <!-- Caption top -->
  <text x="300" y="80" font-family="JetBrains Mono, Courier, monospace" font-size="11" font-weight="400" letter-spacing="2" text-anchor="middle" fill="#6B6862">// EFFICIENCY · ATTESTATION · ENERGY</text>

  <!-- Large eta -->
  <text x="300" y="490" font-family="Instrument Serif, Times New Roman, serif" font-size="440" font-style="italic" font-weight="400" text-anchor="middle" fill="#14F195">η</text>

  <!-- Baseline -->
  <line x1="180" y1="525" x2="420" y2="525" stroke="#F5F1E8" stroke-width="1.5"/>

  <!-- Wordmark -->
  <text x="300" y="640" font-family="Inter Tight, sans-serif" font-size="36" font-weight="300" letter-spacing="10" text-anchor="middle" fill="#F5F1E8">NOETHRION</text>

  <!-- Tagline -->
  <text x="300" y="690" font-family="Instrument Serif, Times New Roman, serif" font-size="22" font-style="italic" font-weight="400" text-anchor="middle" fill="#C4BFB2">Open standard for verifiable energy</text>

  <!-- Equation -->
  <text x="300" y="740" font-family="JetBrains Mono, Courier, monospace" font-size="13" font-weight="400" letter-spacing="2" text-anchor="middle" fill="#6B6862">1 NOET = 1 kWh · verified</text>
</svg>
