<?xml version="1.0" encoding="UTF-8"?>
<!-- F3: Wide Banner -->
<!-- For Twitter headers, GitHub banners, conference slides -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <rect width="1500" height="500" fill="#0A0A0A"/>

  <!-- Left side: η -->
  <text x="200" y="365" font-family="Instrument Serif, Times New Roman, serif" font-size="320" font-style="italic" font-weight="400" text-anchor="middle" fill="#14F195">η</text>
  <line x1="80" y1="395" x2="320" y2="395" stroke="#F5F1E8" stroke-width="1.5"/>

  <!-- Right side: text content -->
  <text x="450" y="200" font-family="JetBrains Mono, Courier, monospace" font-size="14" font-weight="400" letter-spacing="3" fill="#6B6862">// PRESENTING</text>

  <text x="450" y="290" font-family="Instrument Serif, Times New Roman, serif" font-size="80" font-style="italic" font-weight="400" fill="#F5F1E8">Noethrion</text>

  <text x="450" y="340" font-family="Inter Tight, sans-serif" font-size="20" font-weight="300" letter-spacing="2" fill="#C4BFB2">Open standard for verifiable energy.</text>

  <text x="450" y="365" font-family="Inter Tight, sans-serif" font-size="20" font-weight="300" letter-spacing="2" fill="#C4BFB2">1 unit · 1 kWh · cryptographically signed.</text>

  <text x="450" y="430" font-family="JetBrains Mono, Courier, monospace" font-size="13" font-weight="400" fill="#14F195">noethrion.com</text>
