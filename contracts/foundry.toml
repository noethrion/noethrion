# Noethrion Smart Contracts · Foundry Configuration
# https://github.com/foundry-rs/foundry

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"

# Solidity compiler
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false

# Test config
verbosity = 2
fuzz = { runs = 256, max_test_rejects = 65536 }
invariant = { runs = 64, depth = 32, fail_on_revert = false }

# Gas reports
gas_reports = ["NoethrionAttester", "NoethrionToken"]

# Formatter
[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"

# Profile for CI — stricter
[profile.ci]
fuzz = { runs = 1024 }
invariant = { runs = 256, depth = 64 }
verbosity = 3

# Profile for production builds
[profile.production]
optimizer = true
optimizer_runs = 1_000_000
via_ir = true

# RPC endpoints (use env vars in CI/prod).
# Settlement-layer choice is not yet locked in the protocol spec.
# Mainnet + sepolia provided as generic Ethereum endpoints for skeleton testing;
# operators add their own L2 entries via local foundry.toml override or env.
[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }

# See more config options https://book.getfoundry.sh/reference/config.html
