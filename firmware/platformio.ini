; Noethrion firmware — PlatformIO configuration
; Target: ESP32-WROOM-32 dev board + Microchip ATECC608B secure element

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32@^6.7.0
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DNOETHRION_FIRMWARE_VERSION=\"0.1.0-skeleton\"
  -DATECC_I2C_SDA=21
  -DATECC_I2C_SCL=22
  -DATECC_I2C_FREQ=400000
  ; cryptoauthlib needs an explicit HAL flag for ESP32-Arduino I2C.
  ; Without this the linker will fail to find hal_i2c_* symbols.
  -DATCA_HAL_I2C

lib_deps =
  ; Microchip CryptoAuthentication library (ATECC108A/508A/608A/608B)
  ; Pinned to v3.7.9 (latest stable as of 2026-05-11). Bumping requires re-checking
  ; ATCAIfaceCfg field names — they have shifted between minor versions historically.
  https://github.com/MicrochipTech/cryptoauthlib.git#v3.7.9
  ; JSON for attestation payload serialization
  bblanchon/ArduinoJson@^7.1.0

; Optional Modbus path for kWh meters with RS-485 (Eastron SDM230 etc.)
; Enable by adding -DENABLE_MODBUS to build_flags above and uncommenting:
; lib_deps += emelianov/modbus-esp8266@^4.1.0

check_tool = cppcheck
check_flags =
  cppcheck: --enable=warning,style,performance --suppress=missingIncludeSystem
